name: Verify formalization

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical archive
        run: sha256sum -c FORMALIZATION_SHA256.txt
      - name: Extract formalization
        run: tar -xzf formalization-source.tar.gz
      - name: Run source and finite audits
        run: |
          ./audit/source_scan.sh
          python3 ./audit/finite_algebra_check.py
      - uses: leanprover/lean-action@v1
        with:
          build: true
      - name: Print principal theorem axioms
        run: lake env lean RequestProject/Audit.lean
