name: Verify formalization

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify source manifest
        run: sha256sum -c SHA256SUMS

      - name: Run source and finite-algebra audits
        run: |
          ./audit/source_scan.sh
          python3 ./audit/finite_algebra_check.py

      - uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Print principal theorem axioms
        run: lake env lean RequestProject/Audit.lean
